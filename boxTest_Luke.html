<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>박스만들기2</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .bigbox{
            width: 404px;
            /* flex 컨테이너 */
            display: flex;
            flex-wrap: wrap; /* 404px이 넘으면 다음줄로 배치하겠다 */
        }
        .box{
            width: 200px;
            height: 200px;
            border: 1px solid gray;
            display: flex; /* 박스 안 이미지 정렬용 flex 컨테이너 */
        }
        .character{
            width: 100px;
            height: 100px;
        }
        #box1{
            background-color: blue;
            /* 중앙 */
            justify-content: center;
            align-items: center;
        }
        #box2{
            background-color: red;
            /* 우상단 */
            justify-content: flex-end;
            align-items: flex-start;
        }
        #box3{
            background-color: yellow;
            /* 좌하단 */
            justify-content: flex-start;
            align-items: flex-end;
        }
        #box4{
            background-color: orange;
            /* 우하단 */
            justify-content: flex-end;
            align-items: flex-end;
        }
    </style>
</head>
<body>
    <div class="bigbox">
        <div id="box1" class="box">
            <img src="image/image/luke.jpg" alt="" id="img01" class="character">
        </div>
        <div id="box2" class="box">
            <img src="image/image/luke.jpg" alt="" id="img02" class="character">
        </div>
        <div id="box3" class="box">
            <img src="image/image/luke.jpg" alt="" id="img03" class="character">
        </div>
        <div id="box4" class="box">
            <img src="image/image/luke.jpg" alt="" id="img04" class="character">
        </div>
    </div>
</body>
</html>
